<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>DAERWEN · Live</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: #000;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    color: #fff;
    user-select: none;
}

canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    cursor: crosshair;
}

/* ── HUD 右下角 ─────────────────────────────── */
#hud {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(0,0,0,0.7);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    padding: 12px 16px;
    font-size: 11px;
    line-height: 1.9;
    letter-spacing: 0.04em;
    min-width: 170px;
    backdrop-filter: blur(4px);
}
#hud .label { color: rgba(255,255,255,0.4); }
#hud .val   { color: #fff; float: right; margin-left: 16px; }
#hud .sep   { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 6px 0; }

/* ── 事件日志 左上角 ────────────────────────── */
#evlog {
    position: fixed;
    top: 16px;
    left: 16px;
    font-size: 10px;
    line-height: 1.7;
    letter-spacing: 0.03em;
    opacity: 0.75;
    pointer-events: none;
}
.evlog-item {
    animation: fadeout 3s forwards;
}
@keyframes fadeout {
    0%   { opacity: 1; }
    60%  { opacity: 1; }
    100% { opacity: 0; }
}

/* ── 粒子 Tooltip ───────────────────────────── */
#tooltip {
    position: fixed;
    pointer-events: none;
    display: none;
    background: rgba(0,0,0,0.88);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 11px;
    line-height: 1.8;
    max-width: 260px;
    backdrop-filter: blur(8px);
    z-index: 100;
}
#tooltip .genome-row {
    font-size: 10px;
    letter-spacing: 2px;
    margin-top: 4px;
    line-height: 1.4;
    word-break: break-all;
}
.b0 { color: #ff6b6b; } /* A */
.b1 { color: #4ecdc4; } /* T */
.b2 { color: #95e1d3; } /* G */
.b3 { color: #ffd93d; } /* C */

/* ── 状态连接提示 ───────────────────────────── */
#status {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    font-size: 13px;
    letter-spacing: 0.1em;
    opacity: 0.5;
}

/* ── 全屏扰动闪光 ───────────────────────────── */
#flash {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.05s;
}
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="flash"></div>
<div id="hud">
    <span class="label">粒子</span><span class="val" id="h-pop">—</span><br>
    <span class="label">世代</span><span class="val" id="h-gen">—</span><br>
    <span class="label">能量</span><span class="val" id="h-energy">—</span><br>
    <span class="label">步数</span><span class="val" id="h-step">—</span><br>
    <hr class="sep">
    <span class="label">复制</span><span class="val" id="h-rep">0</span><br>
    <span class="label">死亡</span><span class="val" id="h-death">0</span><br>
    <span class="label">互动</span><span class="val" id="h-inter">0</span><br>
    <hr class="sep">
    <span class="label">帧率</span><span class="val" id="h-fps">—</span>
</div>
<div id="evlog"></div>
<div id="tooltip"></div>
<div id="status">正在连接…</div>

<script>
// ── 配置 ────────────────────────────────────────────────────────────────────
const WS_URL = 'ws://localhost:8765';

// ── 画布初始化 ───────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W = 0, H = 0;

function resize() {
    const dpr = window.devicePixelRatio || 1;
    W = canvas.width  = window.innerWidth  * dpr;
    H = canvas.height = window.innerHeight * dpr;
    canvas.style.width  = window.innerWidth  + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.scale(dpr, dpr);
    W /= dpr; H /= dpr;
}
resize();
window.addEventListener('resize', resize);

// ── 视口：平移 + 缩放 ────────────────────────────────────────────────────────
let view = { x: 0, y: 0, zoom: 1 };
let worldSize = 200;
let viewFitted = false;  // 第一帧自动适应屏幕

function worldToScreen(wx, wy) {
    return [
        (wx / worldSize) * W * view.zoom + view.x,
        (wy / worldSize) * H * view.zoom + view.y,
    ];
}
function screenToWorld(sx, sy) {
    return [
        ((sx - view.x) / view.zoom / W) * worldSize,
        ((sy - view.y) / view.zoom / H) * worldSize,
    ];
}

// 拖拽
let drag = null;
canvas.addEventListener('mousedown', e => { drag = { x: e.clientX - view.x, y: e.clientY - view.y }; });
canvas.addEventListener('mousemove', e => {
    if (drag) { view.x = e.clientX - drag.x; view.y = e.clientY - drag.y; }
    onHover(e);
});
canvas.addEventListener('mouseup',   () => drag = null);
canvas.addEventListener('mouseleave',() => { drag = null; hideTooltip(); });

// 滚轮缩放
canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.12 : 1/1.12;
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    view.x = mx - (mx - view.x) * factor;
    view.y = my - (my - view.y) * factor;
    view.zoom *= factor;
    view.zoom = Math.max(0.2, Math.min(view.zoom, 20));
}, { passive: false });

// ── 状态 ────────────────────────────────────────────────────────────────────
let state = null;          // 最新一帧数据
let prevIds  = new Set();  // 上一帧存活 id 集合
let prevEnergy = {};       // id → energy
let prevStats = { replication_events: 0, death_events: 0, interaction_events: 0 };
let effects  = [];         // 视觉特效列表
let atpGrid  = null;       // 化学场数据

// ── 基因组 → 视觉 ─────────────────────────────────────────────────────────
function genomeHue(genome) {
    let h = 0;
    for (let i = 0; i < Math.min(8, genome.length); i++) h = (h * 4 + genome[i]) % 360;
    return h;
}
function genomeShape(genome) {
    const shapes = ['circle','triangle','square','diamond','star','hexagon'];
    let s = 0;
    for (let i = 8; i < Math.min(12, genome.length); i++) s += genome[i];
    return shapes[s % 6];
}
function genomeSize(genome) {
    let sz = 0;
    for (let i = 12; i < Math.min(16, genome.length); i++) sz += genome[i];
    return 2.5 + (sz / 12) * 2.5; // 2.5–5px base size
}
function particleColor(genome, energy, alpha = 1) {
    const hue = genomeHue(genome);
    const sat = 80;
    // 加法混合下粒子作为光源：亮度 35–65%（单独可见，聚集自动叠亮）
    const light = 35 + Math.min(energy, 2) * 15;
    return `hsla(${hue},${sat}%,${light}%,${alpha})`;
}
function glowColor(genome, energy) {
    const hue = genomeHue(genome);
    // 加法模式下 alpha 要小，避免聚集区过曝
    return `hsla(${hue},100%,70%,${Math.min(energy * 0.08, 0.25)})`;
}

// ── 形状绘制 ─────────────────────────────────────────────────────────────────
function drawShape(x, y, size, shape) {
    ctx.beginPath();
    switch (shape) {
        case 'circle':
            ctx.arc(x, y, size, 0, Math.PI * 2);
            break;
        case 'triangle':
            ctx.moveTo(x, y - size);
            ctx.lineTo(x + size * 0.866, y + size * 0.5);
            ctx.lineTo(x - size * 0.866, y + size * 0.5);
            ctx.closePath();
            break;
        case 'square':
            ctx.rect(x - size * 0.85, y - size * 0.85, size * 1.7, size * 1.7);
            break;
        case 'diamond':
            ctx.moveTo(x, y - size);
            ctx.lineTo(x + size * 0.7, y);
            ctx.lineTo(x, y + size);
            ctx.lineTo(x - size * 0.7, y);
            ctx.closePath();
            break;
        case 'star': {
            for (let i = 0; i <= 5; i++) {
                const oa = (i * 4 * Math.PI / 5) - Math.PI / 2;
                const ia = oa + Math.PI / 5;
                const ox = x + Math.cos(oa) * size;
                const oy = y + Math.sin(oa) * size;
                const ix = x + Math.cos(ia) * size * 0.42;
                const iy = y + Math.sin(ia) * size * 0.42;
                i === 0 ? ctx.moveTo(ox, oy) : ctx.lineTo(ox, oy);
                if (i < 5) ctx.lineTo(ix, iy);
            }
            ctx.closePath();
            break;
        }
        case 'hexagon':
            for (let i = 0; i < 6; i++) {
                const a = (i * Math.PI / 3) - Math.PI / 6;
                const px = x + Math.cos(a) * size;
                const py = y + Math.sin(a) * size;
                i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
            }
            ctx.closePath();
            break;
    }
}

// ── 特效系统 ─────────────────────────────────────────────────────────────────
// effect: { type, x, y, t, maxT, [x2, y2, color, ...] }
function spawnReplication(x, y, color) {
    addEffect({ type: 'ring', x, y, color, t: 0, maxT: 30 });
}
function spawnDeath(x, y, color) {
    addEffect({ type: 'death', x, y, color, t: 0, maxT: 18 });
}
function spawnInteraction(x1, y1, x2, y2, strength, predatorHue = 40) {
    addEffect({ type: 'link', x: x1, y: y1, x2, y2, strength, hue: predatorHue, t: 0, maxT: 8 });
}
function triggerFlash(color, duration = 600) {
    const el = document.getElementById('flash');
    el.style.transition = `opacity 0.15s ease-in`;
    el.style.background = color;
    el.style.opacity = '0.12';
    setTimeout(() => {
        el.style.transition = `opacity ${duration}ms ease-out`;
        el.style.opacity = '0';
    }, 150);
}

const MAX_EFFECTS = 120;  // 防止大种群时特效堆积

function tickEffects() {
    const alive = [];
    for (const ef of effects) {
        ef.t++;
        if (ef.t < ef.maxT) alive.push(ef);
    }
    effects = alive;
}

function addEffect(ef) {
    if (effects.length < MAX_EFFECTS) effects.push(ef);
}

function drawEffects(scaleX, scaleY) {
    for (const ef of effects) {
        const p = ef.t / ef.maxT;
        const [sx, sy] = worldToScreen(ef.x, ef.y);
        ctx.save();
        if (ef.type === 'ring') {
            const r = p * 30 * view.zoom;
            const alpha = (1 - p) * 0.8;
            ctx.strokeStyle = ef.color.replace(/[\d.]+\)$/, `${alpha})`);
            ctx.lineWidth = (1 - p) * 2;
            ctx.beginPath();
            ctx.arc(sx, sy, r, 0, Math.PI * 2);
            ctx.stroke();
        } else if (ef.type === 'death') {
            const r = (1 - p) * 8 * view.zoom;
            const alpha = (1 - p) * 0.7;
            ctx.fillStyle = `rgba(255,60,60,${alpha})`;
            ctx.beginPath();
            ctx.arc(sx, sy, r, 0, Math.PI * 2);
            ctx.fill();
        } else if (ef.type === 'link') {
            const [sx2, sy2] = worldToScreen(ef.x2, ef.y2);
            const alpha = (1 - p) * 0.9 * ef.strength;
            ctx.strokeStyle = `hsla(${ef.hue},100%,80%,${alpha})`;
            ctx.lineWidth = (1 - p) * 2;
            ctx.beginPath();
            ctx.moveTo(sx, sy);
            ctx.lineTo(sx2, sy2);
            ctx.stroke();
        }
        ctx.restore();
    }
}

// ── 化学场背景 ───────────────────────────────────────────────────────────────
let fieldCanvas = null;
let fieldCtx    = null;
let lastAtp     = null;
let lastNutrient = null;

function buildFieldTexture(atp, nutrient) {
    if (!atp || !atp.length) return;
    const rows = atp.length;
    const cols = atp[0].length;
    if (!fieldCanvas) {
        fieldCanvas = document.createElement('canvas');
        fieldCtx    = fieldCanvas.getContext('2d');
    }
    fieldCanvas.width  = cols;
    fieldCanvas.height = rows;
    const imgData = fieldCtx.createImageData(cols, rows);
    const d = imgData.data;
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            const a = Math.min((atp[r]?.[c] ?? 0) / 2.0, 1);       // ATP → 绿色
            const n = Math.min((nutrient?.[r]?.[c] ?? 0) / 1.5, 1); // Nutrient → 琥珀色
            const idx = (r * cols + c) * 4;
            // ATP: 绿色通道为主，加少量蓝（冷绿）
            d[idx]   = Math.round(n * 200);           // 红（nutrient 贡献橙色）
            d[idx+1] = Math.round(a * 160 + n * 80); // 绿（ATP主）
            d[idx+2] = Math.round(a * 40);            // 蓝（低）
            d[idx+3] = Math.round(Math.max(a * 130, n * 160)); // alpha
        }
    }
    fieldCtx.putImageData(imgData, 0, 0);
}

function drawChemField() {
    if (!fieldCanvas) return;
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    const [x0, y0] = worldToScreen(0, 0);
    const [x1, y1] = worldToScreen(worldSize, worldSize);
    ctx.drawImage(fieldCanvas, x0, y0, x1 - x0, y1 - y0);
    ctx.restore();
}

// ── 粒子检测事件 ─────────────────────────────────────────────────────────────
function detectEvents(particles) {
    const { positions, energies, ids, genomes } = particles;
    const curIds  = new Set(ids);
    const curEnergy = {};

    // 新增粒子 → 复制事件
    for (let i = 0; i < ids.length; i++) {
        curEnergy[ids[i]] = energies[i];
        if (!prevIds.has(ids[i])) {
            const [sx, sy] = [positions[i][0], positions[i][1]];
            const g = genomes[i] || [];
            const hue = genomeHue(g);
            spawnReplication(sx, sy, `hsla(${hue},100%,70%,1)`);
        }
    }
    // 消失粒子 → 死亡事件
    for (const [id, pos] of Object.entries(prevPos)) {
        if (!curIds.has(parseInt(id))) {
            spawnDeath(pos[0], pos[1], 'rgba(255,60,60,1)');
        }
    }
    // 能量大幅下降 → 可能是被捕食
    for (let i = 0; i < ids.length; i++) {
        const id = ids[i];
        const prev = prevEnergy[id];
        if (prev !== undefined && prev - energies[i] > 0.3) {
            // 找最近的能量增加的粒子作为"捕食者"
            const px = positions[i][0], py = positions[i][1];
            let bestJ = -1, bestDist = 15, bestGain = 0;
            for (let j = 0; j < ids.length; j++) {
                if (j === i) continue;
                const gain = (curEnergy[ids[j]] || 0) - (prevEnergy[ids[j]] || 0);
                if (gain > 0.1) {
                    const dx = positions[j][0] - px;
                    const dy = positions[j][1] - py;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < bestDist) { bestDist = dist; bestJ = j; bestGain = gain; }
                }
            }
            if (bestJ >= 0) {
                const strength = Math.min(bestGain * 2, 1);
                const predHue = genomeHue(genomes[bestJ] || []);
                spawnInteraction(px, py, positions[bestJ][0], positions[bestJ][1], strength, predHue);
            }
        }
    }

    prevIds = curIds;
    Object.assign(prevEnergy, curEnergy);
    // 保存位置用于死亡检测
    for (let i = 0; i < ids.length; i++) prevPos[ids[i]] = positions[i];
}

const prevPos = {};

// ── 全局事件（扰动） ─────────────────────────────────────────────────────────
function handleExternalEvent(inputs) {
    for (const inp of (inputs || [])) {
        const t = inp.input_type || '';
        if (t === 'catastrophe') {
            const ev = inp.params?.event_type || '';
            if (ev === 'mass_extinction') {
                triggerFlash('rgb(255,30,30)', 600);
                addEvLog('⚠ mass_extinction', '#ff4444');
            } else if (ev === 'energy_fluctuation') {
                triggerFlash('rgb(255,180,0)', 300);
                addEvLog('⚡ energy_fluctuation', '#ffcc00');
            } else if (ev === 'mutation_burst') {
                triggerFlash('rgb(120,80,255)', 300);
                addEvLog('🧬 mutation_burst', '#a070ff');
            }
        }
    }
}

// ── 事件日志 ─────────────────────────────────────────────────────────────────
const evlogEl = document.getElementById('evlog');
const evlogItems = [];
function addEvLog(msg, color = '#fff') {
    const div = document.createElement('div');
    div.className = 'evlog-item';
    div.style.color = color;
    div.textContent = msg;
    evlogEl.prepend(div);
    evlogItems.push(div);
    if (evlogItems.length > 8) evlogEl.removeChild(evlogItems.shift());
    setTimeout(() => div.remove(), 3200);
}

// ── HUD 更新 ─────────────────────────────────────────────────────────────────
let prevRepCount = 0, prevDeathCount = 0, prevInterCount = 0;
let totalRep = 0, totalDeath = 0, totalInter = 0;

function updateHud(stats, timeStep) {
    const rep   = stats.replication_events  || 0;
    const death = stats.death_events        || 0;
    const inter = stats.interaction_events  || 0;
    totalRep   += Math.max(0, rep   - prevRepCount);
    totalDeath += Math.max(0, death - prevDeathCount);
    totalInter += Math.max(0, inter - prevInterCount);
    prevRepCount   = rep;
    prevDeathCount = death;
    prevInterCount = inter;

    document.getElementById('h-pop').textContent    = stats.alive_particles ?? '—';
    document.getElementById('h-gen').textContent    = stats.max_generation   ?? '—';
    document.getElementById('h-energy').textContent = (stats.avg_energy ?? stats.total_energy / (stats.alive_particles||1))?.toFixed(2) ?? '—';
    document.getElementById('h-step').textContent   = timeStep ?? '—';
    document.getElementById('h-rep').textContent    = totalRep;
    document.getElementById('h-death').textContent  = totalDeath;
    document.getElementById('h-inter').textContent  = totalInter;
}

// ── Hover tooltip ─────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
const BASE_NAMES = ['A','T','G','C'];
const BASE_CLASS = ['b0','b1','b2','b3'];

function showTooltip(e, particle) {
    const g = particle.genome || [];
    const shape = genomeShape(g);
    const hue   = genomeHue(g);
    const ph    = particle.phenotype || {};

    let genomeHtml = '<div class="genome-row">';
    for (let i = 0; i < g.length; i++) {
        if (i > 0 && i % 8 === 0) genomeHtml += ' ';
        const b = g[i] ?? 0;
        genomeHtml += `<span class="${BASE_CLASS[b]}">${BASE_NAMES[b]}</span>`;
    }
    genomeHtml += '</div>';

    tooltip.innerHTML = `
        <div style="color:hsl(${hue},70%,65%);font-weight:bold;margin-bottom:4px">
            ${shape} · id ${particle.id}
        </div>
        <div><span style="color:rgba(255,255,255,0.4)">能量 </span>${particle.energy?.toFixed(3)}</div>
        <div><span style="color:rgba(255,255,255,0.4)">世代 </span>${particle.generation}</div>
        <div><span style="color:rgba(255,255,255,0.4)">年龄 </span>${particle.age}</div>
        ${ph.replication_threshold ? `<div><span style="color:rgba(255,255,255,0.4)">复制阈值 </span>${ph.replication_threshold?.toFixed(2)}</div>` : ''}
        ${genomeHtml}
    `;
    const x = e.clientX + 14, y = e.clientY + 14;
    tooltip.style.left = Math.min(x, window.innerWidth  - 280) + 'px';
    tooltip.style.top  = Math.min(y, window.innerHeight - 200) + 'px';
    tooltip.style.display = 'block';
}
function hideTooltip() { tooltip.style.display = 'none'; }

function onHover(e) {
    if (!state || drag) { hideTooltip(); return; }
    const rect  = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const [wx, wy] = screenToWorld(mx, my);
    const { positions, energies, ids, genomes, generations, ages, phenotypes } = state.particles;
    const threshold = 6 / view.zoom;
    let best = null, bestDist = Infinity;
    for (let i = 0; i < positions.length; i++) {
        const dx = positions[i][0] - wx;
        const dy = positions[i][1] - wy;
        const d  = Math.sqrt(dx*dx + dy*dy);
        if (d < threshold && d < bestDist) {
            bestDist = d;
            best = {
                id: ids[i], energy: energies[i],
                generation: generations[i], age: ages[i],
                genome: genomes[i], phenotype: phenotypes?.[i] || {},
            };
        }
    }
    if (best) showTooltip(e, best);
    else hideTooltip();
}

// ── 主渲染循环 ────────────────────────────────────────────────────────────────
let lastFpsTime = performance.now();
let fpsFrames   = 0;

function render() {
    requestAnimationFrame(render);

    // 运动模糊拖影：保留 85% 余辉，粒子轨迹自然衰退
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(0, 0, W, H);

    if (!state) return;

    const { positions, energies, ids, genomes } = state.particles;

    // 化学场背景（ATP=绿，Nutrient=琥珀）
    drawChemField();

    // ── 粒子（加法混合：粒子成为光源，聚集区自动变亮）────────────────
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const worldPx = (W * view.zoom) / worldSize;
    for (let i = 0; i < positions.length; i++) {
        const [sx, sy] = worldToScreen(positions[i][0], positions[i][1]);
        if (sx < -20 || sx > W + 20 || sy < -20 || sy > H + 20) continue;

        const g      = genomes[i] || [];
        const energy = energies[i];
        const shape  = genomeShape(g);
        const base   = genomeSize(g);
        const size   = Math.max(2.5, base * worldPx * 0.085);

        // 光晕（高能量粒子，加法模式下自然叠亮）
        if (energy > 1.0 && size > 2) {
            const grd = ctx.createRadialGradient(sx, sy, 0, sx, sy, size * 3.5);
            grd.addColorStop(0,   glowColor(g, energy));
            grd.addColorStop(1,   'rgba(0,0,0,0)');
            ctx.fillStyle = grd;
            ctx.beginPath();
            ctx.arc(sx, sy, size * 3.5, 0, Math.PI * 2);
            ctx.fill();
        }

        // 主体
        ctx.fillStyle = particleColor(g, energy);
        drawShape(sx, sy, size, shape);
        ctx.fill();

        // 轮廓只在粒子足够大时才画
        if (size > 5) {
            const hue = genomeHue(g);
            ctx.strokeStyle = `hsla(${hue},100%,95%,0.25)`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
        }
    }
    ctx.restore();
    // ──────────────────────────────────────────────────────────────────

    // 特效（粒子上层，只画一次）
    drawEffects();
    tickEffects();

    // FPS
    fpsFrames++;
    const now = performance.now();
    if (now - lastFpsTime > 800) {
        const fps = (fpsFrames * 1000 / (now - lastFpsTime)).toFixed(0);
        document.getElementById('h-fps').textContent = fps + ' fps';
        fpsFrames = 0;
        lastFpsTime = now;
    }
}
render();

// ── WebSocket ─────────────────────────────────────────────────────────────────
const statusEl = document.getElementById('status');
let ws = null;
let reconnectTimer = null;

function connect() {
    ws = new WebSocket(WS_URL);

    ws.onopen = () => {
        statusEl.style.display = 'none';
        addEvLog('● 已连接', '#44ff88');
    };

    ws.onmessage = (e) => {
        let data;
        try { data = JSON.parse(e.data); } catch { return; }

        const particles = data.particles || data.visualization?.particles;
        if (!particles || !particles.positions?.length) return;

        // 世界大小：从服务器数据或粒子坐标自动检测
        if (data.visualization?.world_size) {
            worldSize = data.visualization.world_size;
        } else if (particles.positions?.length) {
            const maxCoord = Math.max(...particles.positions.map(p => Math.max(p[0], p[1])));
            if (maxCoord > worldSize * 0.85) worldSize = Math.ceil(maxCoord * 1.05);
        }

        // 第一帧自动将世界填满屏幕
        if (!viewFitted && particles.positions?.length > 10) {
            const fitZoom = Math.min(W / worldSize, H / worldSize) * 0.96;
            view.zoom = fitZoom;
            view.x = (W - worldSize * fitZoom) / 2;
            view.y = (H - worldSize * fitZoom) / 2;
            viewFitted = true;
        }

        // 化学场（ATP + Nutrient）
        const cf = data.chemical_field || data.visualization?.chemical_field || {};
        const atp      = cf.atp;
        const nutrient = cf.nutrient;
        if (atp && atp.length) {
            buildFieldTexture(atp, nutrient);
        }

        // 事件检测
        detectEvents(particles);
        handleExternalEvent(data.recent_inputs || []);

        // 更新状态
        state = { particles };
        updateHud(data.stats || {}, data.time_step);
    };

    ws.onclose = () => {
        statusEl.textContent = '连接断开，重试中…';
        statusEl.style.display = 'block';
        reconnectTimer = setTimeout(connect, 2000);
    };

    ws.onerror = () => { ws.close(); };
}

connect();

// ── 快捷键 ────────────────────────────────────────────────────────────────────
window.addEventListener('keydown', e => {
    if (e.key === 'r' || e.key === 'R') {   // 重置视口
        view = { x: 0, y: 0, zoom: 1 };
    }
});
</script>
